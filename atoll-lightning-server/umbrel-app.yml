manifestVersion: 1
id: atoll-lightning-server
name: Lightning Server
tagline: Self-hosted Lightning Address server with Nostr zap receipts and notifications
icon: https://raw.githubusercontent.com/islandbitcoin/atoll-store/main/atoll-lightning-server/icon.svg
category: bitcoin
version: "0.2.2"
port: 3000
description: >-
  Lightning Server enables you to receive Lightning Address payments at
  you@yourdomain.com. It generates BOLT11 invoices via your LND node,
  publishes Nostr zap receipts (NIP-57), and sends email and push
  notifications for every payment received.


  Features include multi-user Lightning Addresses, alias forwarding,
  MongoDB-backed dynamic aliases, phoenixd webhook support, Nostr profile
  resolution, and a web dashboard for configuration and status monitoring.


  Open the web dashboard after install to configure your Lightning Address,
  connect it to your Umbrel Lightning Node, and set optional notification
  credentials.
releaseNotes: >-
  Fixes Lightning invoice generation with self-hosted LND, settings
  persistence, public web UI routing, and the compact configuration dashboard.
